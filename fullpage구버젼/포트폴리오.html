<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="fullpage.css" />
    <script type="text/javascript" src="fullpage.js"></script>
    <style>
    #fullpage    .section:nth-child(1){
            background: url(main.jpg) top/cover;
        }

        #fullpage    .section:nth-child(2){
            background: url(프로필.jpg) top/cover;
        }    
    
        #fullpage    .section:nth-child(4){
            background: url(포트폴리오2.jpg) top/cover;
        }
     
        #fullpage    .section:nth-child(5){
            background: url(BG.jpg) top/cover;
        }    
        .section:nth-child(3){
        position:relative;}

        .section:nth-child(3) iframe{
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .section:nth-child(3) video{
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;           
        }
    </style>

</head>
<body>
    <div id="fullpage">
	<div class="section"></div>
	<div class="section"></div>
	<div class="section">
        <!-- <iframe src="https://www.youtube.com/embed/8hIPFv8io2s" title="300년 전 침몰한 보물선 쟁탈전" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe> -->
         <video src="텍스트.mp4" controls></video>
    </div>
	<div class="section"></div>
    <div class="section"></div>
    
</div>

    <script>
        new fullpage('#fullpage', {
	//options here
    navigation: true,
	autoScrolling:true,
	scrollHorizontally: true
});
    </script>
</body>
</html>
